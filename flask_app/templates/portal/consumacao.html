{% extends "base.html" %}

{% block content %}
<div class="card shadow mb-4">
    <div class="card-body">
        <div class="container">
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                <h1>CONSUMAÇÃO:</h1>
                <div class="row">
                    <div class="form-group col-md-4">
                        <label for="qtde_agua">Água</label>
                        <select name="qtde_agua" id="qtde_agua" class="form-control">
                            {% for i in range(11) %}
                            <option value="{{ i }}" {% if i==reserva.qtde_agua|int %}selected{% endif %}>{{ i }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group col-md-4">
                        <label for="qtde_refri">Refrigerante</label>
                        <select name="qtde_refri" id="id_qtde_refri" class="form-control">
                            {% for i in range(11) %}
                            <option value="{{ i }}" {% if i==reserva.qtde_refri|int %}selected{% endif %}>{{ i }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group col-md-4">
                        <label for="qtde_cerveja">Cerveja</label>
                        <select name="qtde_cerveja" id="id_qtde_cerveja" class="form-control">
                            {% for i in range(11) %}
                            <option value="{{ i }}" {% if i==reserva.qtde_cerveja|int %}selected{% endif %}>{{ i }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <hr>
                <h1>QUANTIDADE DE PETS:</h1>
                <div class="row">
                    <div class="form-group col-md-4">
                        <label for="qtde_pet">Pets</label>
                        <select name="qtde_pet" id="id_qtde_pet" class="form-control">
                            {% for i in range(11) %}
                            <option value="{{ i }}" {% if i==reserva.qtde_pet|int %}selected{% endif %}>{{ i }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <hr>
                <div class="row">
                    <div class="col-md-12 text-right">
                        <a href="{{ url_for('recepcao.recepcao_checkout') }}" class="btn btn-secondary">Cancelar</a>
                        <button class="btn btn-primary" type="submit">Salvar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
